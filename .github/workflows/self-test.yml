name: Self-Test

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' && github.event_name != 'merge_group' }}

jobs:
  self-test:
    if: ${{ !github.event.pull_request.draft && (github.event_name == 'push' || !github.event.pull_request.head.repo.fork) }}
    name: Self-Test
    environment:
      name: general
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Check Out Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run axe Linter
        uses: ./
        env:
          AXE_LINTER_ONLY: 'fixtures/**'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          api_key: ${{ secrets.API_KEY }}
          axe_linter_url: ${{ vars.LINTER_URL }}
