version: 2

updates:
  - package-ecosystem: 'github-actions'
    rebase-strategy: disabled
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore'
    groups:
      # Any updates not caught by the group config will get individual PRs
      gha-low-risk:
        update-types:
          - 'minor'
          - 'patch'
    cooldown:
      default-days: 7

  - package-ecosystem: 'npm'
    rebase-strategy: disabled
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:37'
      timezone: 'America/New_York'
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
    ignore:
      # Pin @types/node to the major version of Node we run against. Minor
      # and patch updates still flow through.
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
    groups:
      npm-low-risk:
        update-types:
          - 'minor'
          - 'patch'
